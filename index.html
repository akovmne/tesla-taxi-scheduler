<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Tesla Taxi Raspored</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <h1>🚖 Tesla Taxi – Raspored i Punjenje</h1>

  <!-- FILTER -->
  <div class="card">
    <h2>🔎 Filter</h2>

    <input id="filterDriver" placeholder="Filter po vozaču">
    <input id="filterVehicle" placeholder="Filter po vozilu (npr. T-01)">

    <button onclick="renderTable()">🔍 Primijeni filter</button>
    <button onclick="resetFilter()">♻️ Reset filter</button>
  </div>

  <!-- INPUT -->
  <div class="card">
    <h2>➕ Dodaj unos</h2>

    <input id="driver" placeholder="Ime vozača">
    <input id="vehicle" placeholder="Broj vozila (T-01)">
    <input id="date" type="date">

    <input id="shift" placeholder="Smjena (08:00 - 16:00)">
    <input id="chargeStart" placeholder="Početak punjenja (22:00)">
    <input id="chargeEnd" placeholder="Kraj punjenja (02:00)">

    <button onclick="addRow()">Dodaj u tabelu</button>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h2>📅 Dnevni raspored</h2>

    <table>
      <thead>
        <tr>
          <th>Vozač</th>
          <th>Vozilo</th>
          <th>Datum</th>
          <th>Smjena</th>
          <th>Početak punjenja</th>
          <th>Kraj punjenja</th>
          <th>Obriši</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script src="./app.js"></script>
</body>
</html>
