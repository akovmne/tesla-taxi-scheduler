<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Tesla Taxi Raspored</title>
  <link rel="stylesheet" href="./style-2.css">
  <style>
    /* Digital Time Picker Styles */
    #timePickerModal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
    }

    #timePickerContent {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .time-picker-header {
      color: #38bdf8;
      font-size: 1.3em;
      margin-bottom: 20px;
    }

    .time-selects {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }

    select {
      padding: 12px;
      font-size: 1.4em;
      background: #334155;
      color: white;
      border: none;
      border-radius: 8px;
      width: 100px;
    }

    .time-picker-buttons {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    .time-picker-buttons button {
      flex: 1;
      padding: 12px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🚖 Tesla Taxi – Raspored na punjacima </h1>

  <div class="card">
    <h2>🔎 Filter</h2>
    <input id="filterDriver" placeholder="Vozač">
    <input id="filterVehicle" placeholder="Vozilo (T-01)">

    <label>Vrijeme OD</label>
    <input id="filterTimeFrom" type="text" readonly onclick="showTimePicker(this)">

    <label>Vrijeme DO</label>
    <input id="filterTimeTo" type="text" readonly onclick="showTimePicker(this)">

    <button onclick="renderTable()">🔍 Primijeni filter</button>
    <button onclick="resetFilter()">♻️ Reset</button>
  </div>

  <div class="card">
    <h2>➕ Dodaj unos</h2>
    <input id="driver" placeholder="Ime vozača">
    <input id="vehicle" placeholder="Vozilo (T-01)">
    <input id="date" type="date">
    <input id="shift" placeholder="Smjena (08:00 - 16:00)">

    <label>Početak punjenja</label>
    <input id="chargeStart" type="text" readonly onclick="showTimePicker(this)">

    <label>Kraj punjenja</label>
    <input id="chargeEnd" type="text" readonly onclick="showTimePicker(this)">

    <button onclick="addRow()">Dodaj</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('driver')">Vozač ↕</th>
          <th onclick="sortTable('vehicle')">Vozilo ↕</th>
          <th onclick="sortTable('date')">Datum ↕</th>
          <th onclick="sortTable('shift')">Smjena ↕</th>
          <th onclick="sortTable('chargeStart')">Početak ↕</th>
          <th onclick="sortTable('chargeEnd')">Kraj ↕</th>
          <th>Obriši</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<!-- Digital Time Picker Modal -->
<div id="timePickerModal">
  <div id="timePickerContent">
    <div class="time-picker-header">Odaberi vrijeme</div>
    
    <div class="time-selects">
      <select id="hourSelect"></select>
      <span style="font-size:2em;color:#64748b;">:</span>
      <select id="minuteSelect"></select>
    </div>

    <div class="time-picker-buttons">
      <button onclick="setNowTime()">Sada</button>
      <button onclick="cancelTimePicker()">Otkaži</button>
      <button onclick="confirmTimePicker()" style="background:#22c55e;">Potvrdi</button>
    </div>
  </div>
</div>

<script src="./app-2.js"></script>

</body>
</html>
