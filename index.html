<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Tesla Taxi Raspored</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <h1>🚖 Tesla Taxi – Raspored i Punjenje</h1>

  <div class="card">
    <h2>Dodaj unos</h2>

    <input id="driver" placeholder="Ime vozača">
    <input id="vehicle" placeholder="Broj vozila (npr. T-01)">
    <input id="date" type="date">

    <input id="shift" placeholder="Smjena (npr. 08:00 - 16:00)">
    <input id="chargeStart" placeholder="Početak punjenja (npr. 22:00)">
    <input id="chargeEnd" placeholder="Kraj punjenja (npr. 02:00)">

    <button onclick="addRow()">Dodaj u tabelu</button>
  </div>

  <div class="card">
    <h2>📅 Dnevni raspored punjenja</h2>

    <table>
      <thead>
        <tr>
          <th>Vozač</th>
          <th>Vozilo</th>
          <th>Datum</th>
          <th>Smjena</th>
          <th>Početak punjenja</th>
          <th>Kraj punjenja</th>
          <th>Obriši</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script src="./app.js"></script>
</body>
</html>
