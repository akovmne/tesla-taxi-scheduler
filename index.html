<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tesla Taxi Raspored</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<div class="container">

  <h1>🚖 Tesla Taxi – Raspored na punjačima</h1>

  <div class="card">
    <h2>🔎 Filter</h2>
    <div class="grid-inputs">
      <input id="filterDriver" placeholder="Vozač" oninput="renderTable()">
      <input id="filterVehicle" placeholder="Vozilo (T-01)" oninput="renderTable()">
      <input id="filterShift" placeholder="Smjena (npr. 1)" oninput="renderTable()">
    </div>
    
    <div class="grid-inputs">
      <div>
        <label>Početak punjenja</label>
        <input id="filterTimeFrom" class="time-picker" placeholder="Izaberi vrijeme" readonly>
      </div>
      <div>
        <label>Kraj punjenja</label>
        <input id="filterTimeTo" class="time-picker" placeholder="Izaberi vrijeme" readonly>
      </div>
    </div>

    <div class="btn-group">
      <button onclick="renderTable()">🔍 Primijeni filter</button>
      <button onclick="resetFilter()" class="btn-secondary">♻️ Reset</button>
    </div>
  </div>

  <div class="card">
    <h2>➕ Dodaj unos</h2>
    <div class="grid-inputs">
      <input id="driver" placeholder="Ime vozača">
      <input id="vehicle" placeholder="Vozilo (T-01)">
    </div>
    
    <div class="grid-inputs">
      <div>
        <label>Datum rasporeda</label>
        <input id="date" class="date-picker" placeholder="Izaberi datum" readonly>
      </div>
      <div>
        <label>Smjena</label>
        <input id="shift" placeholder="Smjena (1, 2 ili 07:00 - 15:00)">
      </div>
    </div>

    <div class="grid-inputs">
      <div>
        <label>Početak punjenja</label>
        <input id="chargeStart" class="time-picker" placeholder="Izaberi vrijeme" readonly>
      </div>
      <div>
        <label>Kraj punjenja</label>
        <input id="chargeEnd" class="time-picker" placeholder="Izaberi vrijeme" readonly>
      </div>
    </div>

    <button onclick="addRow()" class="btn-success">Dodaj</button>
  </div>

  <div class="card table-card">
    <div class="table-wrapper">
      <table class="responsive-table">
        <thead>
          <tr>
            <th onclick="sortTable('driver')">Vozač ↕</th>
            <th onclick="sortTable('vehicle')">Vozilo ↕</th>
            <th onclick="sortTable('date')">Datum ↕</th>
            <th onclick="sortTable('shift')">Smjena ↕</th>
            <th onclick="sortTable('chargeStart')">Početak ↕</th>
            <th onclick="sortTable('chargeEnd')">Kraj ↕</th>
            <th>Akcija</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="googleModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-icon">⚠️</span>
      <h3 class="modal-title">Unos odbijen</h3>
    </div>
    <div id="modalMessage" class="modal-body">
      Na ovaj datum i vreme već postoje dva zakazana vozila.
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()" class="modal-btn">U redu</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/sr.js"></script>
<script src="./app.js"></script>

</body>
</html>
